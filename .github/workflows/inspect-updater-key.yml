name: Inspect Updater Key

on:
  push:
    branches:
      - inspect-updater-key

jobs:
  inspect:
    runs-on: ubuntu-latest

    steps:
      - name: Install minisign
        run: |
          sudo apt-get update
          sudo apt-get install -y minisign

      - name: Verify old and current updater signatures
        env:
          TAURI_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
        run: |
          set -euo pipefail

          workdir="$(mktemp -d)"
          cd "$workdir"

          python - <<'PY'
          import base64
          import os
          from pathlib import Path

          raw = os.environ["TAURI_UPDATER_PUBLIC_KEY"].strip()
          decoded = base64.b64decode(raw).decode("utf-8")
          normalized = "\n".join(line.rstrip() for line in decoded.splitlines()).strip()
          if not normalized:
            raise SystemExit("TAURI_UPDATER_PUBLIC_KEY is empty after normalization")

          Path("tauri-updater.pub").write_text(normalized + "\n", encoding="utf-8")
          print(f"Normalized updater public key into {len(normalized.splitlines())} line(s).")
          PY

          curl -fsSL -o github-latest.json \
            https://github.com/Swift-tunnel/swifttunnel-app/releases/download/v1.20.18/latest.json
          curl -fsSL -o github-1.20.18.exe \
            https://github.com/Swift-tunnel/swifttunnel-app/releases/download/v1.20.18/SwiftTunnel_1.20.18_x64-setup.exe
          jq -r '.platforms["windows-x86_64-nsis"].signature' github-latest.json | base64 -d > github-1.20.18.sig

          curl -fsSL -o gitlab-latest.json \
            https://gitlab.com/api/v4/projects/80054502/packages/generic/swifttunnel-app/1.21.16/latest.json
          curl -fsSL -o gitlab-1.21.16.exe "$(jq -r '.url' gitlab-latest.json)"
          jq -r '.signature' gitlab-latest.json | base64 -d > gitlab-1.21.16.sig

          verify_with_secret() {
            local artifact="$1"
            local sig="$2"
            local label="$3"

            echo "Verifying ${label} with file-form updater key"
            minisign -Vm "$artifact" -p tauri-updater.pub -x "$sig"
          }

          verify_with_secret github-1.20.18.exe github-1.20.18.sig "GitHub v1.20.18"
          verify_with_secret gitlab-1.21.16.exe gitlab-1.21.16.sig "GitLab 1.21.16"

          echo "Both releases verify with the current GitHub updater public key."
