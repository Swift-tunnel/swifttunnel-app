name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to build or republish
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.inputs.tag != '' && github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Build & Publish (Tauri)
    runs-on: [self-hosted, Windows, X64, testbench, swifttunnel-app]
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag != '' && format('refs/tags/{0}', github.event.inputs.tag) || github.ref }}

      - name: Ensure Git Bash
        shell: powershell
        run: |
          $gitBashPaths = @(
            'C:\Program Files\Git\bin',
            'C:\Program Files\Git\usr\bin'
          ) | Where-Object { Test-Path $_ }

          if ($gitBashPaths.Count -eq 0) {
            throw 'Git Bash was not found on the runner.'
          }

          foreach ($path in $gitBashPaths) {
            $path | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            $env:Path = "$path;$env:Path"
          }

          bash --version

      - name: Resolve tag metadata
        id: meta
        shell: powershell
        run: |
          $tag = "${{ github.event.inputs.tag != '' && github.event.inputs.tag || github.ref_name }}".Trim()
          if ($tag -notmatch '^v\d+\.\d+\.\d+(?:-[0-9A-Za-z\.-]+)?(?:\+[0-9A-Za-z\.-]+)?$') {
            throw "Tag '$tag' is not valid semver with v-prefix"
          }

          $version = $tag.Substring(1)
          $appVersion = ($version -split '\+', 2)[0]
          $isPrerelease = if ($appVersion.Contains("-")) { "true" } else { "false" }

          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "app_version=$appVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "prerelease=$isPrerelease" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "channel_class=$(if ($isPrerelease -eq 'true') { 'live' } else { 'stable' })" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Select updater signing key
        shell: powershell
        env:
          TAG: ${{ steps.meta.outputs.tag }}
          CURRENT_TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          CURRENT_TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          LEGACY_TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_LEGACY_PRIVATE_KEY }}
          LEGACY_TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_LEGACY_PRIVATE_KEY_PASSWORD }}
        run: |
          function Add-MultilineEnv {
            param(
              [string]$Name,
              [string]$Value
            )

            $delimiter = "EOF_$([Guid]::NewGuid().ToString('N'))"
            "$Name<<$delimiter" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            $Value | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            $delimiter | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }

          function Get-TomlSectionBody {
            param(
              [string]$Content,
              [string]$SectionName
            )

            $escapedName = [regex]::Escape($SectionName)
            $match = [regex]::Match($Content, "(?ms)^\[$escapedName\]\s*(?<body>.*?)(?:^\[|\z)")
            if ($match.Success) {
              return $match.Groups["body"].Value
            }

            return $null
          }

          function Get-TomlStringValue {
            param(
              [string]$SectionBody,
              [string]$Key
            )

            if ([string]::IsNullOrWhiteSpace($SectionBody)) {
              return $null
            }

            $escapedKey = [regex]::Escape($Key)
            $match = [regex]::Match($SectionBody, '(?m)^\s*' + $escapedKey + '\s*=\s*"([^"]+)"')
            if ($match.Success) {
              return $match.Groups[1].Value.Trim()
            }

            return $null
          }

          $legacyTags = @()
          $currentUpdaterKeyId = $null
          $legacyUpdaterKeyId = $null
          $configPath = "release-signing.toml"
          if (Test-Path $configPath) {
            $content = Get-Content $configPath -Raw
            $currentSectionBody = Get-TomlSectionBody -Content $content -SectionName "current"
            $legacySectionBody = Get-TomlSectionBody -Content $content -SectionName "legacy_bridge"

            $currentUpdaterKeyId = Get-TomlStringValue -SectionBody $currentSectionBody -Key "updater_key_id"
            $legacyUpdaterKeyId = Get-TomlStringValue -SectionBody $legacySectionBody -Key "updater_key_id"

            if (-not [string]::IsNullOrWhiteSpace($legacySectionBody)) {
              $legacyTags = [regex]::Matches($legacySectionBody, '"([^"]+)"') |
                ForEach-Object { $_.Groups[1].Value.Trim() } |
                Where-Object { -not [string]::IsNullOrWhiteSpace($_) }
            }
          }

          if ([string]::IsNullOrWhiteSpace($currentUpdaterKeyId)) {
            throw "release-signing.toml is missing [current].updater_key_id"
          }
          if ([string]::IsNullOrWhiteSpace($legacyUpdaterKeyId)) {
            throw "release-signing.toml is missing [legacy_bridge].updater_key_id"
          }

          $useLegacySigning = $legacyTags -contains $env:TAG

          "SWIFTTUNNEL_CURRENT_UPDATER_KEY_ID=$currentUpdaterKeyId" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "SWIFTTUNNEL_LEGACY_UPDATER_KEY_ID=$legacyUpdaterKeyId" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          if ($useLegacySigning) {
            if ([string]::IsNullOrWhiteSpace($env:LEGACY_TAURI_SIGNING_PRIVATE_KEY)) {
              throw "Missing required secret for legacy bridge tag $env:TAG: TAURI_SIGNING_LEGACY_PRIVATE_KEY"
            }
            Add-MultilineEnv "TAURI_SIGNING_PRIVATE_KEY" $env:LEGACY_TAURI_SIGNING_PRIVATE_KEY

            if (-not [string]::IsNullOrEmpty($env:LEGACY_TAURI_SIGNING_PRIVATE_KEY_PASSWORD)) {
              "TAURI_SIGNING_PRIVATE_KEY_PASSWORD=$env:LEGACY_TAURI_SIGNING_PRIVATE_KEY_PASSWORD" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            }

            "SWIFTTUNNEL_SIGNING_SLOT=legacy" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            "SWIFTTUNNEL_REQUIRE_LEGACY_UPDATER_PUBLIC_KEY=true" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          } else {
            Add-MultilineEnv "TAURI_SIGNING_PRIVATE_KEY" $env:CURRENT_TAURI_SIGNING_PRIVATE_KEY

            if (-not [string]::IsNullOrEmpty($env:CURRENT_TAURI_SIGNING_PRIVATE_KEY_PASSWORD)) {
              "TAURI_SIGNING_PRIVATE_KEY_PASSWORD=$env:CURRENT_TAURI_SIGNING_PRIVATE_KEY_PASSWORD" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            }

            "SWIFTTUNNEL_SIGNING_SLOT=current" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            "SWIFTTUNNEL_REQUIRE_LEGACY_UPDATER_PUBLIC_KEY=false" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }

      - name: Ensure tag commit is on main history
        shell: bash
        run: |
          git fetch origin main --deepen=200
          release_commit="$(git rev-parse HEAD)"
          if ! git merge-base --is-ancestor "$release_commit" "origin/main"; then
            echo "::error::Tag commit is not on origin/main history"
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: swifttunnel-desktop/package-lock.json

      - name: Enforce version consistency
        shell: powershell
        env:
          EXPECTED_VERSION: ${{ steps.meta.outputs.app_version }}
        run: |
          node scripts/check-desktop-version-sync.mjs $env:EXPECTED_VERSION

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          cache-on-failure: true
          save-if: true

      - name: Install frontend dependencies
        working-directory: swifttunnel-desktop
        run: npm ci

      - name: Prepare bundled driver payloads
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # ALWAYS re-download the WinpkFilter MSIs. Previously we skipped the
          # download when a cached copy was on disk (`if (-not (Test-Path))`),
          # which meant workflow re-runs or cached workspaces could ship an
          # installer without the MSIs. Runtime then warned
          # "Bundled runtime asset not found: WinpkFilter-x64.msi" (see ferdi's
          # 2026-04-19 support log). Belt-and-suspenders: tauri's build.rs
          # panics if these files are missing when it runs, so even if this
          # step misbehaves the build still fails loudly.
          $driversDir = "swifttunnel-desktop/src-tauri/resources/drivers"
          New-Item -ItemType Directory -Path $driversDir -Force | Out-Null

          $x64Path = Join-Path $driversDir "WinpkFilter-x64.msi"
          $arm64Path = Join-Path $driversDir "WinpkFilter-arm64.msi"

          # Clear any stale copies so the download always runs from empty.
          Remove-Item -Path $x64Path -Force -ErrorAction SilentlyContinue
          Remove-Item -Path $arm64Path -Force -ErrorAction SilentlyContinue

          # x64 MSI
          gh release download v3.6.2 --repo wiresock/ndisapi --pattern "Windows.Packet.Filter.3.6.2.1.x64.msi" --dir $driversDir --clobber
          Rename-Item (Join-Path $driversDir "Windows.Packet.Filter.3.6.2.1.x64.msi") "WinpkFilter-x64.msi" -Force

          # ARM64 MSI
          gh release download v3.6.2 --repo wiresock/ndisapi --pattern "Windows.Packet.Filter.3.6.2.1.ARM64.msi" --dir $driversDir --clobber
          Rename-Item (Join-Path $driversDir "Windows.Packet.Filter.3.6.2.1.ARM64.msi") "WinpkFilter-arm64.msi" -Force

          # Validate both MSIs. Size + SHA-256 check — size catches 404
          # HTML pages, partial downloads, or upstream retags that shrunk
          # the asset; SHA-256 catches upstream retags that kept the same
          # size but changed the payload. The expected hashes MUST stay in
          # lockstep with `MSI_PACKAGE_*.sha256` in
          # swifttunnel-core/src/vpn/winpkfilter.rs — if you bump the
          # driver version, update both places.
          $expectedHashes = @{
            "$x64Path"   = '9c388c0b7f189f7fa98720bae2caecf7d64f30910838b80b438ecf8956b8502c'
            "$arm64Path" = 'b13c6832c9e5c0c14948bbf5c17ccbe65dff55c0f6069df01494d97ebd1f3d69'
          }
          foreach ($msiPath in @($x64Path, $arm64Path)) {
            if (-not (Test-Path $msiPath)) {
              throw "Missing WinpkFilter MSI at $msiPath after download"
            }
            $size = (Get-Item $msiPath).Length
            if ($size -lt 500000) {
              throw ("Downloaded WinpkFilter MSI {0} is suspiciously small ({1} bytes)" -f $msiPath, $size)
            }
            $actualHash = (Get-FileHash -Path $msiPath -Algorithm SHA256).Hash.ToLower()
            $expectedHash = $expectedHashes[$msiPath]
            if ($actualHash -ne $expectedHash) {
              throw ("WinpkFilter MSI {0} failed SHA-256 check: expected {1}, got {2}. Either upstream retagged the release or the download is corrupt -- do not ship this build." -f $msiPath, $expectedHash, $actualHash)
            }
            Write-Host ("Verified {0} ({1} bytes, sha256={2})" -f $msiPath, $size, $actualHash)
          }

          # Extract the signed driver package for MSI-time installation. The
          # SwiftTunnel MSI must not launch a nested MSI, so the WiX custom
          # action calls SwiftTunnel.exe --install-driver, which uses pnputil
          # against these extracted INF/SYS/CAT files.
          $packageRoot = Join-Path $driversDir "winpkfilter"
          Remove-Item -Path $packageRoot -Recurse -Force -ErrorAction SilentlyContinue

          function Expand-WinpkFilterPackage {
            param(
              [Parameter(Mandatory = $true)][string]$MsiPath,
              [Parameter(Mandatory = $true)][string]$Arch
            )

            $extractDir = Join-Path $env:RUNNER_TEMP ("winpkfilter-extract-" + $Arch)
            $extractLog = Join-Path $env:RUNNER_TEMP ("winpkfilter-extract-" + $Arch + ".log")
            Remove-Item -Path $extractDir -Recurse -Force -ErrorAction SilentlyContinue
            New-Item -ItemType Directory -Path $extractDir -Force | Out-Null

            $targetArg = "TARGETDIR=$extractDir"
            $process = Start-Process -FilePath "msiexec.exe" -ArgumentList @(
              "/a",
              $MsiPath,
              $targetArg,
              "/qn",
              "/norestart",
              "/L*V",
              $extractLog
            ) -Wait -PassThru

            if ($process.ExitCode -ne 0) {
              throw "Failed to extract $MsiPath with msiexec /a (exit $($process.ExitCode), log: $extractLog)"
            }

            $inf = Get-ChildItem -Path $extractDir -Recurse -Filter "ndisrd_lwf.inf" -File |
              Select-Object -First 1
            if (-not $inf) {
              throw "Extracted WinpkFilter package for $Arch did not contain ndisrd_lwf.inf (log: $extractLog)"
            }

            $sourceDir = $inf.Directory.FullName
            $destDir = Join-Path $packageRoot (Join-Path $Arch "win10")
            New-Item -ItemType Directory -Path $destDir -Force | Out-Null

            foreach ($fileName in @("ndisrd_lwf.inf", "ndisrd.sys", "ndisrd.cat")) {
              $sourcePath = Join-Path $sourceDir $fileName
              if (-not (Test-Path $sourcePath)) {
                throw "Extracted WinpkFilter package for $Arch is missing $fileName in $sourceDir"
              }
              Copy-Item -Path $sourcePath -Destination (Join-Path $destDir $fileName) -Force
            }

            $minimumSizes = @{
              "ndisrd_lwf.inf" = 256
              "ndisrd.sys" = 4096
              "ndisrd.cat" = 256
            }
            foreach ($fileName in $minimumSizes.Keys) {
              $path = Join-Path $destDir $fileName
              $size = (Get-Item $path).Length
              if ($size -lt $minimumSizes[$fileName]) {
                throw "Extracted WinpkFilter package file $path is suspiciously small ($size bytes)"
              }
            }

            Write-Host "Extracted WinpkFilter $Arch driver package to $destDir"
          }

          Expand-WinpkFilterPackage -MsiPath $x64Path -Arch "x64"
          Expand-WinpkFilterPackage -MsiPath $arm64Path -Arch "arm64"

      - name: Verify updater signing secrets
        shell: powershell
        env:
          TAURI_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
          TAURI_UPDATER_LEGACY_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_LEGACY_PUBLIC_KEY }}
          SWIFTTUNNEL_UPDATE_MANIFEST_PRIVATE_KEY: ${{ secrets.SWIFTTUNNEL_UPDATE_MANIFEST_PRIVATE_KEY }}
          SWIFTTUNNEL_UPDATE_MANIFEST_PUBLIC_KEY_B64: ${{ secrets.SWIFTTUNNEL_UPDATE_MANIFEST_PUBLIC_KEY_B64 }}
        run: |
          function Get-MinisignKeyId {
            param([string]$EncodedKey)

            $decoded = [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String($EncodedKey.Trim()))
            $firstLine = ($decoded -split "\r?\n")[0].Trim()
            $match = [regex]::Match($firstLine, '([0-9A-F]{16})$')
            if (-not $match.Success) {
              throw "Unable to determine minisign key id from updater public key comment"
            }

            return $match.Groups[1].Value
          }

          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) {
            throw "Missing selected signing private key for slot '$env:SWIFTTUNNEL_SIGNING_SLOT'"
          }
          if ([string]::IsNullOrWhiteSpace($env:TAURI_UPDATER_PUBLIC_KEY)) {
            throw "Missing required secret: TAURI_UPDATER_PUBLIC_KEY"
          }
          $currentUpdaterKeyId = Get-MinisignKeyId $env:TAURI_UPDATER_PUBLIC_KEY
          if ($currentUpdaterKeyId -ne $env:SWIFTTUNNEL_CURRENT_UPDATER_KEY_ID) {
            throw "TAURI_UPDATER_PUBLIC_KEY is key id '$currentUpdaterKeyId' but release-signing.toml expects '$env:SWIFTTUNNEL_CURRENT_UPDATER_KEY_ID'"
          }
          if (
            $env:SWIFTTUNNEL_REQUIRE_LEGACY_UPDATER_PUBLIC_KEY -eq "true" -and
            [string]::IsNullOrWhiteSpace($env:TAURI_UPDATER_LEGACY_PUBLIC_KEY)
          ) {
            throw "Missing required secret for legacy bridge signing: TAURI_UPDATER_LEGACY_PUBLIC_KEY"
          }
          if (-not [string]::IsNullOrWhiteSpace($env:TAURI_UPDATER_LEGACY_PUBLIC_KEY)) {
            $legacyUpdaterKeyId = Get-MinisignKeyId $env:TAURI_UPDATER_LEGACY_PUBLIC_KEY
            if ($legacyUpdaterKeyId -ne $env:SWIFTTUNNEL_LEGACY_UPDATER_KEY_ID) {
              throw "TAURI_UPDATER_LEGACY_PUBLIC_KEY is key id '$legacyUpdaterKeyId' but release-signing.toml expects '$env:SWIFTTUNNEL_LEGACY_UPDATER_KEY_ID'"
            }
          }
          if ([string]::IsNullOrWhiteSpace($env:SWIFTTUNNEL_UPDATE_MANIFEST_PRIVATE_KEY)) {
            throw "Missing required secret: SWIFTTUNNEL_UPDATE_MANIFEST_PRIVATE_KEY"
          }
          if ([string]::IsNullOrWhiteSpace($env:SWIFTTUNNEL_UPDATE_MANIFEST_PUBLIC_KEY_B64)) {
            throw "Missing required secret: SWIFTTUNNEL_UPDATE_MANIFEST_PUBLIC_KEY_B64"
          }

      - name: Inject updater public key
        shell: powershell
        env:
          TAURI_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
        run: |
          $confPath = "swifttunnel-desktop/src-tauri/tauri.conf.json"
          $config = Get-Content $confPath -Raw | ConvertFrom-Json
          $config.plugins.updater.pubkey = $env:TAURI_UPDATER_PUBLIC_KEY
          $utf8NoBom = New-Object System.Text.UTF8Encoding($false)
          [System.IO.File]::WriteAllText($confPath, ($config | ConvertTo-Json -Depth 32), $utf8NoBom)

      # Optional: patch tauri.conf.json with a Windows Authenticode signCommand
      # if the SWIFTTUNNEL_SIGN_COMMAND secret is set. When absent, the build
      # proceeds unsigned — same as every release before this one.
      #
      # To enable signing, add SWIFTTUNNEL_SIGN_COMMAND as a repo secret with
      # the full command your signer expects, using %1 as the file placeholder.
      # Examples:
      #   DigiCert KeyLocker: smctl sign --keypair-alias %SMCTL_KEYPAIR_ALIAS% --input %1
      #   SSL.com eSigner:    CodeSignTool.bat sign -input_file_path=%1 -username=%ESIGNER_USER% -password=%ESIGNER_PASS% -credential_id=%ESIGNER_CRED%
      #   Local PFX:          signtool sign /f %PFX_PATH% /p %PFX_PASSWORD% /tr http://timestamp.digicert.com /td sha256 /fd sha256 %1
      # Then populate the secondary secrets (SMCTL_*, ESIGNER_*, PFX_*) on the
      # Build step's env block below so tauri-action can see them at sign time.
      - name: Inject code signing command (optional)
        shell: powershell
        env:
          SWIFTTUNNEL_SIGN_COMMAND: ${{ secrets.SWIFTTUNNEL_SIGN_COMMAND }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:SWIFTTUNNEL_SIGN_COMMAND)) {
            Write-Host "::notice::SWIFTTUNNEL_SIGN_COMMAND secret not set - building unsigned (Defender may flag the installer until the binary accrues SmartScreen reputation)"
            exit 0
          }
          $confPath = "swifttunnel-desktop/src-tauri/tauri.conf.json"
          $config = Get-Content $confPath -Raw | ConvertFrom-Json
          $config.bundle.windows | Add-Member -NotePropertyName signCommand -NotePropertyValue $env:SWIFTTUNNEL_SIGN_COMMAND -Force
          $utf8NoBom = New-Object System.Text.UTF8Encoding($false)
          [System.IO.File]::WriteAllText($confPath, ($config | ConvertTo-Json -Depth 32), $utf8NoBom)
          Write-Host "::notice::Authenticode signCommand injected - Tauri will sign SwiftTunnel.exe and the MSI installer"

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_UPDATER_LEGACY_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_LEGACY_PUBLIC_KEY }}
          SWIFTTUNNEL_UPDATE_MANIFEST_PUBLIC_KEY_B64: ${{ secrets.SWIFTTUNNEL_UPDATE_MANIFEST_PUBLIC_KEY_B64 }}
          # Code signing passthrough - all optional. Populate whichever secrets
          # your signing provider needs so the signCommand injected above can
          # reference them as %VAR% (cmd.exe) or $env:VAR (PowerShell).
          SMCTL_KEYPAIR_ALIAS: ${{ secrets.SMCTL_KEYPAIR_ALIAS }}
          SMCTL_API_KEY: ${{ secrets.SMCTL_API_KEY }}
          SMCTL_HOST: ${{ secrets.SMCTL_HOST }}
          SMCTL_CLIENT_CERT_FILE: ${{ secrets.SMCTL_CLIENT_CERT_FILE }}
          SMCTL_CLIENT_CERT_PASSWORD: ${{ secrets.SMCTL_CLIENT_CERT_PASSWORD }}
          ESIGNER_USER: ${{ secrets.ESIGNER_USER }}
          ESIGNER_PASS: ${{ secrets.ESIGNER_PASS }}
          ESIGNER_CRED: ${{ secrets.ESIGNER_CRED }}
          ESIGNER_TOTP: ${{ secrets.ESIGNER_TOTP }}
          PFX_PATH: ${{ secrets.PFX_PATH }}
          PFX_PASSWORD: ${{ secrets.PFX_PASSWORD }}
        with:
          projectPath: swifttunnel-desktop
          tagName: ${{ steps.meta.outputs.tag }}
          releaseName: SwiftTunnel v${{ steps.meta.outputs.version }}
          releaseBody: See release assets to download this version.
          releaseDraft: false
          prerelease: ${{ steps.meta.outputs.prerelease }}
          generateReleaseNotes: true
          includeUpdaterJson: true
          updaterJsonPreferNsis: false

      - name: Generate and upload signed release manifest
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.meta.outputs.tag }}
          VERSION: ${{ steps.meta.outputs.version }}
          CHANNEL_CLASS: ${{ steps.meta.outputs.channel_class }}
          SWIFTTUNNEL_UPDATE_MANIFEST_PRIVATE_KEY: ${{ secrets.SWIFTTUNNEL_UPDATE_MANIFEST_PRIVATE_KEY }}
        run: |
          $outDir = Join-Path $env:RUNNER_TEMP "swifttunnel_manifest"
          New-Item -ItemType Directory -Path $outDir -Force | Out-Null

          gh release download $env:TAG --repo $env:GITHUB_REPOSITORY --pattern "latest.json" --dir $outDir --clobber

          $latestPath = Join-Path $outDir "latest.json"
          if (-not (Test-Path $latestPath)) {
            throw "latest.json was not found in release assets for $env:TAG"
          }

          $latestSha = (Get-FileHash -Path $latestPath -Algorithm SHA256).Hash.ToLower()
          $latestUrl = "https://github.com/Swift-tunnel/swifttunnel-app/releases/download/$env:TAG/latest.json"

          $manifestPath = Join-Path $outDir "swifttunnel-update-manifest.json"
          $signaturePath = Join-Path $outDir "swifttunnel-update-manifest.sig"

          $manifest = [ordered]@{
            version = $env:VERSION
            tag = $env:TAG
            channel_class = $env:CHANNEL_CLASS
            latest_json_url = $latestUrl
            latest_json_sha256 = $latestSha
          } | ConvertTo-Json -Depth 8

          $utf8NoBom = New-Object System.Text.UTF8Encoding($false)
          [System.IO.File]::WriteAllText($manifestPath, $manifest, $utf8NoBom)

          $env:MANIFEST_PATH = $manifestPath
          $env:SIGNATURE_PATH = $signaturePath
          node -e "const fs=require('fs');const crypto=require('crypto');const manifest=fs.readFileSync(process.env.MANIFEST_PATH);const signature=crypto.sign(null,manifest,process.env.SWIFTTUNNEL_UPDATE_MANIFEST_PRIVATE_KEY).toString('base64');fs.writeFileSync(process.env.SIGNATURE_PATH,signature+'\n');"

          gh release upload $env:TAG $manifestPath $signaturePath --repo $env:GITHUB_REPOSITORY --clobber
