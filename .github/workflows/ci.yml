name: CI

on:
  push:
    branches: [main]
    paths:
      - "swifttunnel-core/**"
      - "swifttunnel-desktop/**"
      - "scripts/check-desktop-version-sync.mjs"
      - "release-signing.toml"
      - "Cargo.toml"
      - ".github/workflows/ci.yml"
      - ".github/workflows/release.yml"
  pull_request:
    branches: [main]
    paths:
      - "swifttunnel-core/**"
      - "swifttunnel-desktop/**"
      - "scripts/check-desktop-version-sync.mjs"
      - "release-signing.toml"
      - "Cargo.toml"
      - ".github/workflows/ci.yml"
      - ".github/workflows/release.yml"

jobs:
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: swifttunnel-desktop

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: swifttunnel-desktop/package-lock.json

      - name: Check desktop version sync
        run: node ../scripts/check-desktop-version-sync.mjs

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

      - name: Build frontend
        run: npm run build

  rust:
    name: Rust Check (Windows)
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Ensure Git Bash
        shell: powershell
        run: |
          $gitBashPaths = @(
            'C:\Program Files\Git\bin',
            'C:\Program Files\Git\usr\bin'
          ) | Where-Object { Test-Path $_ }

          if ($gitBashPaths.Count -eq 0) {
            throw 'Git Bash was not found on the testbench runner.'
          }

          foreach ($path in $gitBashPaths) {
            $path | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            $env:Path = "$path;$env:Path"
          }

          bash --version

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check core
        run: cargo check -p swifttunnel-core

      - name: Check desktop backend
        run: cargo check -p swifttunnel-desktop

      - name: Test core
        run: cargo test -p swifttunnel-core -- --nocapture

      - name: Test desktop backend
        run: cargo test -p swifttunnel-desktop -- --nocapture

  split-tunnel-testbench:
    name: Split Tunnel Testbench (Windows)
    runs-on: [self-hosted, Windows, X64, testbench]
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run split tunnel API tunneling testbench
        shell: powershell
        env:
          SWIFTTUNNEL_TEST_EMAIL: ${{ secrets.SWIFTTUNNEL_TEST_EMAIL }}
          SWIFTTUNNEL_TEST_PASSWORD: ${{ secrets.SWIFTTUNNEL_TEST_PASSWORD }}
          SWIFTTUNNEL_TEST_ACCESS_TOKEN: ${{ secrets.SWIFTTUNNEL_TEST_ACCESS_TOKEN }}
        run: |
          $ErrorActionPreference = "Stop"
          $argsList = @(
            "-EnableApiTunneling",
            "-CustomRelay", "45.32.115.254:51821"
          )
          if ($env:SWIFTTUNNEL_TEST_EMAIL) {
            $argsList += @("-Email", $env:SWIFTTUNNEL_TEST_EMAIL)
          }
          if ($env:SWIFTTUNNEL_TEST_PASSWORD) {
            $argsList += @("-Password", $env:SWIFTTUNNEL_TEST_PASSWORD)
          }
          .\Windows-testbench\run_split_tunnel_integration_test.ps1 @argsList
