name: Reconcile Releases

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: reconcile-github-releases
  cancel-in-progress: false

jobs:
  reconcile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure bot identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Backfill missing GitHub tag or release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITLAB_REPO_URL: https://gitlab.com/swifttunnel-group/swifttunnel-app.git
        run: |
          set -euo pipefail

          git fetch origin main --tags --force
          if git remote get-url gitlab-mirror >/dev/null 2>&1; then
            git remote set-url gitlab-mirror "${GITLAB_REPO_URL}"
          else
            git remote add gitlab-mirror "${GITLAB_REPO_URL}"
          fi

          mapfile -t gitlab_tags < <(
            git ls-remote --tags --refs "${GITLAB_REPO_URL}" "v*" |
              awk '{print $2}' |
              sed 's#refs/tags/##' |
              sort -V
          )

          latest_gitlab_tag=""
          if [[ "${#gitlab_tags[@]}" -gt 0 ]]; then
            latest_gitlab_tag="${gitlab_tags[-1]}"
          fi

          latest_github_tag="$(
            git for-each-ref \
              --merged=origin/main \
              --sort=version:refname \
              --format='%(refname:strip=2)' \
              refs/tags/v* |
              tail -n 1
          )"

          target_tag="$(
            printf '%s\n' "${latest_gitlab_tag}" "${latest_github_tag}" |
              awk 'NF > 0' |
              sort -V |
              tail -n 1
          )"

          if [[ -z "${target_tag}" ]]; then
            echo "No release tags found on GitHub or GitLab."
            exit 0
          fi

          missing_github_tag=""
          if [[ "${target_tag}" == "${latest_gitlab_tag}" ]] && ! git show-ref --verify --quiet "refs/tags/${target_tag}"; then
            missing_github_tag="${target_tag}"
          fi

          if [[ -n "${missing_github_tag}" ]]; then
            echo "Backfilling missing GitHub tag ${missing_github_tag} from GitLab"
            git fetch gitlab-mirror "refs/tags/${missing_github_tag}:refs/tags/${missing_github_tag}" --force
            release_commit="$(git rev-list -n 1 "${missing_github_tag}")"

            if ! git merge-base --is-ancestor "${release_commit}" "origin/main"; then
              echo "::error::Refusing to push ${missing_github_tag} because ${release_commit} is not on origin/main"
              exit 1
            fi

            git push origin "refs/tags/${missing_github_tag}"
            echo "Pushed ${missing_github_tag} to GitHub; the Release workflow will publish assets."
            exit 0
          fi

          in_progress_release_count="$(
            gh run list \
              --repo "${GITHUB_REPOSITORY}" \
              --workflow Release \
              --json status \
              --limit 20 \
              --jq '[.[] | select(.status != "completed")] | length'
          )"

          if [[ "${in_progress_release_count}" != "0" ]]; then
            echo "A GitHub Release workflow is already in progress; skipping reconciliation."
            exit 0
          fi

          if ! git show-ref --verify --quiet "refs/tags/${target_tag}"; then
            echo "Latest tag ${target_tag} is not present on GitHub yet; nothing else to reconcile."
            exit 0
          fi

          release_commit="$(git rev-list -n 1 "${target_tag}")"
          if ! git merge-base --is-ancestor "${release_commit}" "origin/main"; then
            echo "::error::Refusing to publish ${target_tag} because ${release_commit} is not on origin/main"
            exit 1
          fi

          if gh release view "${target_tag}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "GitHub tag ${target_tag} already has a release entry."
            exit 0
          fi

          echo "Dispatching Release workflow for existing GitHub tag ${target_tag}"
          gh workflow run Release --repo "${GITHUB_REPOSITORY}" -f tag="${target_tag}"
